name: Build APK

on:
  workflow_dispatch: 
  push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow

      - name: Generate requirements.txt
        run: |
          echo "flet" > requirements.txt
          echo "pillow" >> requirements.txt

      - name: Build APK
        # 'yes |' automatically terminal prompts ka jawab 'y' (yes) me de deta hai
        run: yes | flet build apk --project pos_ps --product "POS-PS"

      - name: Rename APK File
        run: |
          find build/apk -name "*.apk" -exec mv {} build/apk/POS-PS.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: POS-PS
          path: build/apk/POS-PS.apk
